<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <nav>
    <div class="container nav-container">
      <a href="#" class="logo">Portfolio.</a>
      <ul class="nav-links">
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </div>
  </nav>

  <section id="home" class="hero">
    <div class="container hero-content">
      <img id="avatar-img" src="" alt="Profile" class="avatar">
      <h1 id="hero-name"></h1>
      <p id="hero-title"></p>
      <a href="#contact" class="btn">Get In Touch</a>
    </div>
  </section>

  <section id="about" class="about">
    <div class="container">
      <h2>About Me</h2>
      <p id="about-bio"></p>
      
      <h3 style="margin-top: 2rem;">Technologies & Skills</h3>
      <div id="skills-list" class="skills-list"></div>
      
      <h3 style="margin-top: 2rem;">Certificates</h3>
      <div id="certificates-list" class="certificates-list"></div>
      
      <h3 style="margin-top: 2rem;">Resume/CV</h3>
      <div id="resume-link"></div>
    </div>
  </section>

  <section id="projects" class="projects">
    <div class="container">
      <h2>Projects</h2>
      <div class="projects-grid" id="projects-grid"></div>
    </div>
  </section>

  <section id="contact" class="contact">
    <div class="container">
      <h2>Contact</h2>
      <div class="contact-info">
        <p><i class="fas fa-envelope"></i> <span id="contact-email"></span></p>
        <p><i class="fas fa-phone"></i> <span id="contact-phone"></span></p>
        <div class="social-links" id="social-links"></div>
      </div>
      <p class="admin-link"><a href="/admin-login.html"><i class="fas fa-lock"></i> Admin Login</a></p>
    </div>
  </section>

  <footer>
    <p>&copy; 2025 My Portfolio. All rights reserved.</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
